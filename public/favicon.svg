  <line x1="11.7" y1="18.5" x2="13" y2="17.7" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20.3" y1="18.5" x2="19" y2="17.7" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
</svg>
